version: "3.8"

services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: medcart
      POSTGRES_PASSWORD: medcart
      POSTGRES_DB: medcart
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
